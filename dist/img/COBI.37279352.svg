<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 200"
  width="200"
  height="200"
  fill="none"
>
  <!-- Cuerpo del robot -->
  <rect x="40" y="60" width="120" height="80" rx="15" fill="black" stroke="black" stroke-width="4"/>

  <!-- Cabeza del robot -->
  <rect x="50" y="20" width="100" height="60" rx="15" fill="black" stroke="black" stroke-width="4"/>

  <!-- Ojos -->
  <circle cx="75" cy="50" r="8" fill="white" stroke="black" stroke-width="3"/>
  <circle cx="125" cy="50" r="8" fill="white" stroke="black" stroke-width="3"/>
  
  <!-- Sonrisa -->
  <path d="M75 65 Q100 85 125 65" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Antena -->
  <line x1="100" y1="10" x2="100" y2="20" stroke="black" stroke-width="4"/>
  <circle cx="100" cy="10" r="5" fill="#F4C542" stroke="black" stroke-width="2"/>

  <!-- Brazos -->
  <rect x="20" y="70" width="20" height="60" rx="10" fill="black"/>
  <rect x="160" y="70" width="20" height="60" rx="10" fill="black"/>

  <!-- Piernas -->
  <rect x="60" y="140" width="20" height="30" rx="10" fill="black"/>
  <rect x="120" y="140" width="20" height="30" rx="10" fill="black"/>
</svg>
